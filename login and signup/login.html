<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | LearnFlow AI</title>

    <!-- Google Font -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet" href="login.css">

</head>

<body>
    <div id="loginSection">
        <!-- ===========================
            LOGIN PAGE
    ============================ -->

        <main class="login-page">

            <!-- Login Card -->

            <section class="login-card">

                <!-- Back Button -->

                <div class="back-home">

                    <a href="index.html">

                        <i class="fa-solid fa-arrow-left"></i>

                        LearnFlow AI

                    </a>

                </div>

                <!-- Login Content -->

                <div class="login-content">
                    <!-- ===========================
        LOGIN HEADER
=========================== -->

                    <div class="login-header">

                        <h1>

                            Welcome Back 👋

                        </h1>

                        <p>

                            Login to continue your AI-powered learning journey.

                        </p>

                    </div>

                    <!-- ===========================
        LOGIN FORM
=========================== -->

                    <form action="#" method="POST" class="login-form">

                        <!-- Email -->

                        <div class="input-group">

                            <label for="email">

                                Email Address

                            </label>

                            <div class="input-field">

                                <i class="fa-solid fa-envelope"></i>

                                <input type="email" id="email" name="email" placeholder="Enter your email"
                                    autocomplete="email">

                            </div>

                            <small class="error-message"></small>

                        </div>
                        <!-- Password -->

                        <div class="input-group">

                            <label for="password">

                                Password

                            </label>

                            <div class="input-field">

                                <i class="fa-solid fa-lock"></i>

                                <input type="password" id="password" name="password" placeholder="Enter your password"
                                    autocomplete="current-password">

                                <button type="button" class="toggle-password" aria-label="Show Password">

                                    <i class="fa-solid fa-eye"></i>

                                </button>

                            </div>

                            <small class="error-message"></small>

                        </div>

                        <!-- Remember & Forgot -->

                        <div class="form-options">

                            <label class="remember-me">

                                <input type="checkbox" name="remember" id="remember" value="1">

                                <span>

                                    Remember Me

                                </span>

                            </label>

                            <a href="#" class="forgotLink" id="forgotLink">

                                Forgot Password?

                            </a>

                        </div>

                        <!-- Login Button -->

                        <button type="submit" class="login-btn">

                            Login

                        </button>

                    </form>

                    <!-- Divider -->

                    <div class="divider">

                        <span>

                            OR

                        </span>

                    </div>

                    <!-- Bottom Link -->

                    <div class="signup-link">

                        <p>

                            Don't have an account?

                            <a href="signup.html">

                                Create Account

                            </a>

                        </p>

                    </div>
                </div>

            </section>

        </main>
    </div>

    <!-- FORGOT PASSWORD SECTION -->


    <div id="forgotSection" class="auth-section">


        <h2>Forgot Password?</h2>


        <p class="small-text">

            Enter your registered email

        </p>



        <div class="input-box">


            <input type="email" id="forgotEmail" placeholder="Email Address">


        </div>



        <button type="button" id="sendOtpBtn">

            Send OTP

        </button>



        <p class="backLogin">

            Back to Login

        </p>


    </div>





    <!-- OTP SECTION -->


    <div id="otpSection" class="auth-section">


        <h2>Verify OTP</h2>


        <p class="small-text">

            Check your email 📩

        </p>



        <div class="input-box">


            <input type="text" id="otp" placeholder="Enter 6 digit OTP" maxlength="6">


        </div>



        <button id="verifyOtpBtn">

            Verify OTP

        </button>


    </div>






    <!-- RESET PASSWORD SECTION -->


    <div id="resetSection" class="auth-section">


        <h2>New Password</h2>



        <p class="small-text">

            Create a strong password 🔐

        </p>



        <div class="input-box">


            <input type="password" id="newPassword" placeholder="New Password">


        </div>




        <div class="input-box">


            <input type="password" id="confirmPassword" placeholder="Confirm Password">


        </div>



        <button id="updatePasswordBtn">

            Update Password

        </button>


    </div>

    <script src="login.js"></script>

</body>

</html>
